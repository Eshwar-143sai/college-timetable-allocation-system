server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Land on the dashboard by default (there's no login/auth in this build yet)
    location = / {
        return 302 /public/dashboard.html;
    }

    # Static JS/CSS/images referenced as ../static/... from pages under /public/
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1h;
        access_log off;
    }

    # Reverse-proxy API calls to the backend container so the frontend
    # can call same-origin paths (see frontend/static/js/config.js).
    # NOTE: The trailing slash in proxy_pass preserves the /api/ prefix.
    # A request to /api/v1/... is forwarded as http://backend:8000/api/v1/...
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML pages: /public/dashboard.html, /public/course-management.html, etc.
    location /public/ {
        try_files $uri $uri.html =404;
    }
}
