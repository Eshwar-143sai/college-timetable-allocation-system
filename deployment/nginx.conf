server {
    listen 80;
    listen [::]:80;
    server_name timetable.yourcollege.edu;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name timetable.yourcollege.edu;

    # SSL configuration (Certbot will overwrite paths, provided here as placeholder)
    ssl_certificate /etc/letsencrypt/live/timetable.yourcollege.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timetable.yourcollege.edu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory for Static Frontend client
    root /var/www/college-timetable-allocation-system/frontend;
    index public/dashboard.html;

    # Serve Frontend Client Pages
    location / {
        try_files $uri $uri/ =404;
    }

    # Serve Static JS/CSS Assets directly with aggressive caching
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy API Requests to backend Gunicorn daemon running on port 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout configurations
        proxy_connect_timeout 60s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Custom Error Pages
    error_page 404 /public/404.html;
    error_page 500 502 503 504 /public/500.html;
}
